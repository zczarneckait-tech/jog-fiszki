<title>Fiszki – Językoznawstwo Ogólne</title>

    text-align: center;
  }

  }

  }

    height: 320px;
    cursor: pointer;
    margin-bottom: 24px;
  }

    width: 100%;
    height: 100%;

    border-radius: 18px;
  }

    position: absolute;
    width: 100%;
    height: 100%;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;

    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  }
  .card-back {
    background: white;
    color: #2d3748;
    transform: rotateY(180deg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    overflow-y: auto;
  }
  .card-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 16px;
  }

    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .card-category {
    font-size: 0.75rem;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 99px;
    margin-top: 14px;
  }
  .card-definition {
    font-size: 1rem;
    line-height: 1.6;
    color: #2d3748;
    margin-bottom: 12px;
  }
  .card-example {
    font-size: 0.88rem;
    color: #718096;
    background: #f7fafc;
    border-left: 3px solid #667eea;
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    text-align: left;
    width: 100%;
  }
  .card-example strong { color: #667eea; }
  .hint {
    font-size: 0.78rem;
    color: #a0aec0;
    margin-bottom: 20px;
  }

    gap: 12px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 16px;
  }

    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;

    background: #fed7d7;
    color: #c53030;
  }

  .btn-yes {

    color: #276749;

    margin-bottom: 20px;

  }

<body>

<h1>📚 Fiszki – Językoznawstwo Ogólne</h1>
<p class="subtitle">Kliknij kartę, żeby zobaczyć definicję</p>

<div class="filter-wrap" id="filters"></div>

<div class="stats">
  <div class="stat"><div class="stat-num blue" id="stat-total">0</div><div class="stat-label">Wszystkich</div></div>
  <div class="stat"><div class="stat-num green" id="stat-yes">0</div><div class="stat-label">Umiałam</div></div>
  <div class="stat"><div class="stat-num red" id="stat-no">0</div><div class="stat-label">Powtórzyć</div></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>
<div class="counter" id="counter">1 / 1</div>

<button class="shuffle-btn" onclick="shuffle()">🔀 Losuj kolejność</button>

<div class="card-wrap" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="card-label">Termin</div>
      <div class="card-term" id="term">...</div>
      <div class="card-category" id="category">...</div>
    </div>
    <div class="card-face card-back">
      <div class="card-label">Definicja i przykład</div>
      <div class="card-definition" id="definition">...</div>
      <div class="card-example" id="example">...</div>
    </div>
  </div>
</div>

<p class="hint" id="hint">👆 Kliknij kartę, żeby zobaczyć odpowiedź</p>

<div class="buttons" id="answer-buttons" style="display:none">
  <button class="btn-prev" onclick="prevCard()">← Wróć</button>
  <button class="btn-no" onclick="answer(false)">✗ Nie umiałam</button>
  <button class="btn-yes" onclick="answer(true)">✓ Umiałam</button>
</div>

<div class="end-screen" id="end-screen">
  <h2>🎉 Koniec!</h2>
  <p id="end-text"></p>
  <button class="btn-restart" onclick="restart(false)">🔄 Zacznij od nowa</button>
  <button class="btn-restart-wrong" onclick="restart(true)" id="btn-wrong" style="margin-top:10px">❌ Tylko te których nie umiałam</button>
</div>

    category: "Teorie semantyczne",
    definition: "Fauconnier i Turner (1998/2002) — mechanizm tworzenia nowego znaczenia przez stapienie elementów z różnych przestrzeni mentalnych. Struktura: 2 przestrzenie wejściowe + przestrzeń ogólna → BLEND z emergentną strukturą nieobecną w żadnym wejściu. Jest bardziej ogólny niż metafora — obejmuje też humor, kontrfaktuały, analogie.",
    example: "'Chirurg to rzeźnik': wejście 1 (chirurg: precyzja, cel terapeutyczny) + wejście 2 (rzeźnik: grube cięcia, brutalność) → blend: niekompetentny lekarz. Emergencja: ta ocena nie istnieje w żadnym wejściu osobno."
  }
];

let cards = [...ALL_CARDS];
let current = 0;
let flipped = false;
let scores = { yes: 0, no: 0 };
let answered = new Array(cards.length).fill(null);
let activeFilter = 'Wszystkie';

const categories = ['Wszystkie', ...new Set(ALL_CARDS.map(c => c.category))];

function initFilters() {
  const wrap = document.getElementById('filters');
  wrap.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
    btn.textContent = cat === 'Wszystkie' ? '🌐 Wszystkie' : cat;
    btn.onclick = () => setFilter(cat);
    wrap.appendChild(btn);
  });
}

function setFilter(cat) {
  activeFilter = cat;
  if (cat === 'Wszystkie') {
    cards = [...ALL_CARDS];
  } else {
    cards = ALL_CARDS.filter(c => c.category === cat);
  }
  answered = new Array(cards.length).fill(null);
  scores = { yes: 0, no: 0 };
  current = 0;
  flipped = false;
  initFilters();
  updateCard();
  updateStats();
  document.getElementById('end-screen').style.display = 'none';
  document.querySelector('.card-wrap').style.display = 'block';
  document.querySelector('.progress-bar-wrap').style.display = 'block';
  document.querySelector('.counter').style.display = 'block';
  document.querySelector('.shuffle-btn').style.display = 'inline-block';
}

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  answered = new Array(cards.length).fill(null);
  scores = { yes: 0, no: 0 };
  current = 0;
  flipped = false;
  updateCard();
  updateStats();
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('hint').textContent = '👇 Czy umiałaś?';
  document.getElementById('answer-buttons').style.display = 'flex';
}

function answer(knew) {
  answered[current] = knew;
  if (knew) scores.yes++; else scores.no++;
  updateStats();
  current++;
  if (current >= cards.length) {
    showEnd();
  } else {
    flipped = false;
    document.getElementById('card').classList.remove('flipped');
    document.getElementById('answer-buttons').style.display = 'none';
    document.getElementById('hint').textContent = '👆 Kliknij kartę, żeby zobaczyć odpowiedź';
    updateCard();
  }
}

function prevCard() {
  if (current === 0) return;
  current--;
  if (answered[current] !== null) {
    if (answered[current]) scores.yes--; else scores.no--;
    answered[current] = null;
    updateStats();
  }
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answer-buttons').style.display = 'none';
  document.getElementById('hint').textContent = '👆 Kliknij kartę, żeby zobaczyć odpowiedź';
  updateCard();
}

function updateCard() {
  const c = cards[current];
  document.getElementById('term').textContent = c.term;
  document.getElementById('category').textContent = c.category;
  document.getElementById('definition').textContent = c.definition;
  document.getElementById('example').innerHTML = '<strong>💡 Przykład:</strong> ' + c.example;
  const pct = Math.round((current / cards.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = (current + 1) + ' / ' + cards.length;
}

function updateStats() {
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-yes').textContent = scores.yes;
  document.getElementById('stat-no').textContent = scores.no;
}

function showEnd() {
  document.querySelector('.card-wrap').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.querySelector('.counter').style.display = 'none';
  document.getElementById('answer-buttons').style.display = 'none';
  document.querySelector('.shuffle-btn').style.display = 'none';
  document.getElementById('hint').textContent = '';
  document.getElementById('progress-bar').style.width = '100%';
  const end = document.getElementById('end-screen');
  end.style.display = 'flex';
  const pct = Math.round((scores.yes / cards.length) * 100);
  document.getElementById('end-text').textContent =
    `Umiałaś ${scores.yes} z ${cards.length} kart (${pct}%). ` +
    (pct === 100 ? '🏆 Perfekcja!' : pct >= 80 ? '🎯 Świetnie!' : pct >= 60 ? '💪 Całkiem dobrze!' : '📖 Warto powtórzyć!');
  const btnWrong = document.getElementById('btn-wrong');
  btnWrong.style.display = scores.no > 0 ? 'block' : 'none';
}

function restart(wrongOnly) {
  if (wrongOnly) {
    const wrongIndices = answered.map((a, i) => a === false ? i : -1).filter(i => i >= 0);
    cards = wrongIndices.map(i => cards[i]);
  } else {
    if (activeFilter === 'Wszystkie') cards = [...ALL_CARDS];
    else cards = ALL_CARDS.filter(c => c.category === activeFilter);
  }
  answered = new Array(cards.length).fill(null);
  scores = { yes: 0, no: 0 };
  current = 0;
  flipped = false;
  document.getElementById('end-screen').style.display = 'none';
  document.querySelector('.card-wrap').style.display = 'block';
  document.querySelector('.progress-bar-wrap').style.display = 'block';
  document.querySelector('.counter').style.display = 'block';
  document.querySelector('.shuffle-btn').style.display = 'inline-block';
  document.getElementById('hint').textContent = '👆 Kliknij kartę, żeby zobaczyć odpowiedź';
  updateCard();
  updateStats();
}

initFilters();
updateCard();
updateStats();
</script>
</body>
</html>
